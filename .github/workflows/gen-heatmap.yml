name: Generate Heatmap

on:
  schedule:
    - cron: '0 18 * * *'   # 毎日 03:00 JST
  workflow_dispatch:        # 手動実行も可

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # git push 権限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install firebase-admin

      - name: Decode Firebase SA key
        run: |
          echo "${{ secrets.FIREBASE_SA_KEY }}" | base64 -d > /tmp/sa_key.json
      - name: Generate heatmap.json
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
        run: |
          python scripts/gen_heatmap.py
      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/heatmap.json
          git diff --staged --quiet || git commit -m "chore: update heatmap.json [skip ci]"
          git pull --rebase
          git push
