# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# gen-heatmap.yml  砂金投稿座標 → heatmap.json 自動生成
#
# 【フロー】
#   毎日 03:00 JST (= 18:00 UTC) に実行
#   1. Firestore から投稿座標を取得
#   2. scripts/gen_heatmap.py で集計・GeoJSON生成
#   3. data/heatmap.json としてリポジトリに commit
#
# 【Phase2で有効化する手順】
#   1. GitHub Secrets に以下を追加:
#      FIREBASE_PROJECT_ID  … FirebaseプロジェクトID
#      FIREBASE_SA_KEY      … サービスアカウントJSONキー (base64エンコード)
#   2. このファイルの "# [PHASE2 UNCOMMENT]" 行のコメントを外す
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Generate Heatmap

on:
  schedule:
    - cron: '0 18 * * *'   # 毎日 03:00 JST
  workflow_dispatch:        # 手動実行も可

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # git push 権限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install firebase-admin

      - name: Decode Firebase SA key
        run: |
          echo "${{ secrets.FIREBASE_SA_KEY }}" | base64 -d > /tmp/sa_key.json
      - name: Generate heatmap.json
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
        run: |
          python scripts/gen_heatmap.py
      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/heatmap.json
          git diff --staged --quiet || git commit -m "chore: update heatmap.json [skip ci]"
          git pull --rebase
          git push
